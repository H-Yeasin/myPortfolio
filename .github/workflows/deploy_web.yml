name: Deploy Flutter Portfolio

on:
  push:
    branches: [ "main" ] # for branch name 'main'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # This automatically uses the latest stable Flutter version

      - name: Get Dependencies
        run: flutter pub get

      # --- CRITICAL STEP: Build for Web ---
      # We must set --base-href because the site is at /myPortfolio/, not the root domain.
      - name: Build Web App
        run: flutter build web --release --base-href "/myPortfolio/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true